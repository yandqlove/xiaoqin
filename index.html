<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎉小秦专属3.8女神节快乐🎉</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', '微软雅黑', sans-serif;
            overflow-x: hidden;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            position: relative;
        }

        /* 飘落的花瓣背景 - 最外层 */
        .petals-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999;
            overflow: hidden;
        }

        .petal {
            position: absolute;
            width: 15px;
            height: 15px;
            background: radial-gradient(ellipse at center, #ffb6c1 0%, #ff69b4 100%);
            border-radius: 50% 0 50% 0;
            opacity: 0.7;
            animation: fall linear infinite;
        }

        @keyframes fall {
            0% {
                transform: translateY(-100px) rotate(0deg) translateX(0);
                opacity: 0.8;
            }
            50% {
                opacity: 0.5;
            }
            100% {
                transform: translateY(100vh) rotate(360deg) translateX(100px);
                opacity: 0;
            }
        }

        /* 星星闪烁 */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9998;
        }

        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            animation: twinkle 2s infinite;
        }

        @keyframes twinkle {
            0%, 100% {
                opacity: 0.2;
                transform: scale(1);
            }
            50% {
                opacity: 1;
                transform: scale(1.5);
            }
        }

        /* 主容器 */
        .container {
            position: relative;
            z-index: 10;
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
            text-align: center;
        }

        /* 标题区域 */
        .header {
            margin-bottom: 50px;
            animation: fadeInDown 1s ease-out;
        }

        .title {
            font-size: 3.5em;
            color: #fff;
            text-shadow: 0 5px 15px rgba(0,0,0,0.3);
            margin-bottom: 20px;
            animation: glow 2s ease-in-out infinite;
        }

        .subtitle {
            font-size: 1.5em;
            color: #ffe4e1;
            margin-bottom: 10px;
        }

        .date {
            font-size: 1.2em;
            color: #ffc0cb;
            letter-spacing: 2px;
        }

        @keyframes glow {
            0%, 100% {
                text-shadow: 0 5px 15px rgba(255,255,255,0.5);
            }
            50% {
                text-shadow: 0 5px 30px rgba(255,255,255,0.9);
            }
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 爱心卡片 */
        .heart-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 50px 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            margin-bottom: 40px;
            animation: fadeInUp 1s ease-out 0.5s both;
            position: relative;
            overflow: hidden;
        }

        .heart-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,182,193,0.2), transparent);
            animation: shine 3s infinite;
        }

        @keyframes shine {
            0% {
                transform: translateX(-100%) translateY(-100%) rotate(45deg);
            }
            100% {
                transform: translateX(100%) translateY(100%) rotate(45deg);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 3D旋转爱心 */
        .heart-3d {
            width: 150px;
            height: 150px;
            margin: 0 auto 30px;
            position: relative;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-20px);
            }
        }

        .heart {
            position: relative;
            width: 100%;
            height: 100%;
            animation: heartbeat 1.5s ease-in-out infinite;
        }

        .heart::before,
        .heart::after {
            content: '';
            position: absolute;
            width: 75px;
            height: 120px;
            background: linear-gradient(135deg, #ff1493, #ff69b4);
            border-radius: 75px 75px 0 0;
            box-shadow: 0 10px 30px rgba(255,20,147,0.4);
        }

        .heart::before {
            left: 75px;
            transform: rotate(-45deg);
            transform-origin: 0 100%;
        }

        .heart::after {
            left: 0;
            transform: rotate(45deg);
            transform-origin: 100% 100%;
        }

        @keyframes heartbeat {
            0%, 100% {
                transform: scale(1);
            }
            10%, 30% {
                transform: scale(1.1);
            }
            20%, 40% {
                transform: scale(1);
            }
        }

        /* 文字内容 */
        .message {
            position: relative;
            z-index: 1;
        }

        .message h2 {
            color: #ff1493;
            font-size: 2em;
            margin-bottom: 25px;
        }

        .message p {
            color: #666;
            font-size: 1.1em;
            line-height: 2;
            margin-bottom: 15px;
        }

        .highlight {
            color: #ff1493;
            font-weight: bold;
            font-size: 1.15em;
        }

        /*玫瑰花束 - 使用Emoji */
        .roses {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 20px;
            margin: 50px 0 40px;
            font-size: 80px;
            animation: fadeIn 1s ease-out 1s both;
        }

        .rose {
            display: inline-block;
            animation: roseGrow 0.8s ease-out forwards;
            transform-origin: bottom center;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.2));
            transition: transform 0.3s ease;
        }

        .rose:hover {
            transform: scale(1.2) rotate(10deg);
        }

        .rose:nth-child(1) {
            animation-delay: 0s;
        }

        .rose:nth-child(2) {
            animation-delay: 0.2s;
        }

        .rose:nth-child(3) {
            animation-delay: 0.4s;
            font-size: 100px;
        }

        .rose:nth-child(4) {
            animation-delay: 0.6s;
        }

        .rose:nth-child(5) {
            animation-delay: 0.8s;
        }

        @keyframes roseGrow {
            from {
                transform: scaleY(0) translateY(50px);
                opacity: 0;
            }
            to {
                transform: scaleY(1) translateY(0);
                opacity: 1;
            }
        }

        /* 按钮区域 */
        .button-group {
            margin-top: 40px;
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 15px 40px;
            font-size: 1.1em;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
            position: relative;
            overflow: hidden;
        }

        .btn-primary {
            background: linear-gradient(135deg, #ff1493, #ff69b4);
            color: white;
            box-shadow: 0 10px 30px rgba(255,20,147,0.4);
        }

        .btn-primary:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(255,20,147,0.6);
        }

        .btn-secondary {
            background: white;
            color: #ff1493;
            border: 2px solid #ff1493;
        }

        .btn-secondary:hover {
            background: #ff1493;
            color: white;
            transform: translateY(-5px);
        }

        /* 页脚 */
        .footer {
            position: relative;
            z-index: 10;
            max-width: 800px;
            margin: 0 auto;
            padding: 30px 20px 40px;
            text-align: center;
            animation: fadeIn 1.5s ease-out 2s both;
        }

        .footer-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 25px 30px;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .footer-content {
            color: #fff;
            font-size: 0.95em;
            line-height: 1.8;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }

        .footer-content .creator {
            font-size: 1.1em;
            font-weight: bold;
            color: #ffc0cb;
            margin-bottom: 8px;
            display: block;
        }

        .footer-content .quote {
            font-style: italic;
            opacity: 0.9;
            margin-top: 8px;
            font-size: 0.9em;
        }

        .footer-heart {
            display: inline-block;
            color: #ff69b4;
            animation: heartPulse 1.5s ease-in-out infinite;
        }

        @keyframes heartPulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.2);
            }
        }

        /*弹窗 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 10000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            animation: zoomIn 0.5s ease-out;
            max-width: 500px;
            margin: 0 20px;
        }

        @keyframes zoomIn {
            from {
                transform: scale(0);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .modal-content h2 {
            color: #ff1493;
            font-size: 2em;
            margin-bottom: 20px;
        }

        .modal-content p {
            color: #666;
            font-size: 1.2em;
            line-height: 1.8;
        }

        .emoji {
            font-size: 3em;
            margin: 20px 0;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .title {
                font-size: 2.5em;
            }
            
            .subtitle {
                font-size: 1.2em;
            }
            
            .heart-card {
                padding: 30px 20px;
            }
            
            .message h2 {
                font-size: 1.5em;
            }
            
            .message p {
                font-size: 1em;
            }

            .roses {
                gap: 15px;
                font-size: 60px;
            }

            .rose:nth-child(3) {
                font-size: 75px;
            }
            
            .button-group {
                flex-direction: column;
            }
            
            .btn {
                width: 100%;
            }

            .footer-content {
                font-size: 0.85em;
            }

            .footer-content .creator {
                font-size: 1em;
            }
        }
    </style>
</head>
<body>
    <!--飘落的花瓣 - 最外层 -->
    <div class="petals-container" id="petals"></div>

    <!-- 星星-->
    <div class="stars" id="stars"></div>

    <!-- 主容器 -->
    <div class="container">
        <!-- 标题 -->
        <div class="header">
            <h1 class="title">女神节快乐</h1>
            <p class="subtitle">致最美的你</p>
            <p class="date">2026.03.08</p>
        </div>

        <!-- 爱心卡片 -->
        <div class="heart-card">
            <!-- 3D爱心 -->
            <div class="heart-3d">
                <div class="heart"></div>
            </div>

            <!-- 文字内容 -->
            <div class="message">
                <h2>亲爱的女神小秦：</h2>
                <p>在这个特别的日子里，我想对你说：</p>
                <p>你的笑容比春天的花朵更加灿烂，</p>
                <p>你的眼睛比星空更加璀璨。</p>
                <p class="highlight">遇见你，是我最美的意外。</p>
                <p>愿这束虚拟的玫瑰，能传递我最真挚的心意。</p>
                <p>希望能有机会，为你献上真实的花束，</p>
                <p>陪你走过每一个春夏秋冬。</p>
            </div>

            <!-- 玫瑰花束 -->
            <div class="roses">
                <span class="rose">🌹</span>
                <span class="rose">🌹</span>
                <span class="rose">🌹</span>
                <span class="rose">🌹</span>
                <span class="rose">🌹</span>
            </div>

            <!-- 按钮 -->
            <div class="button-group">
                <button class="btn btn-primary" onclick="showModal('yes')">
                    接受我的心意 💕
                </button>
                <button class="btn btn-secondary" onclick="showModal('maybe')">
                    再考虑考虑 🌸
                </button>
            </div>
        </div>
    </div>

    <!-- 页脚 -->
    <div class="footer">
        <div class="footer-card">
            <div class="footer-content">
                <span class="creator">💝 用心制作 by 闫老师</span>
                <div>
                    每一个细节都在诉说着心意<br>
                    愿这份小小的浪漫，能让你感受到我的真诚
                </div>
                <div class="quote">
                    "世间所有的相遇，都是久别重逢" <span class="footer-heart">❤️</span>
                </div>
            </div>
        </div>
    </div>

    <!--弹窗 -->
    <div class="modal" id="modal">
        <div class="modal-content">
            <div class="emoji" id="modalEmoji">🎉</div>
            <h2 id="modalTitle">太好了！</h2>
            <p id="modalText"></p>
            <button class="btn btn-primary" onclick="closeModal()" style="margin-top: 20px;">
                关闭
            </button>
        </div>
    </div>

    <script>
        // 创建飘落的花瓣
        function createPetals() {
            const container = document.getElementById('petals');
            for (let i = 0; i < 40; i++) {
                const petal = document.createElement('div');
                petal.className = 'petal';
                petal.style.left = Math.random() * 100 + '%';
                petal.style.animationDuration = (Math.random() * 4 + 5) + 's';
                petal.style.animationDelay = Math.random() * 5 + 's';
                container.appendChild(petal);
            }
        }

        // 创建星星
        function createStars() {
            const container = document.getElementById('stars');
            for (let i = 0; i < 50; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDelay = Math.random() * 2 + 's';
                container.appendChild(star);
            }
        }

        // 显示弹窗
        function showModal(type) {
            const modal = document.getElementById('modal');
            const emoji = document.getElementById('modalEmoji');
            const title = document.getElementById('modalTitle');
            const text = document.getElementById('modalText');

            if (type === 'yes') {
                emoji.textContent = '🎉';
                title.textContent = '太好了！';
                text.textContent = '你的微笑就是对我最好的回应！让我们一起创造更多美好的回忆吧！';
            } else {
                emoji.textContent = '🌸';
                title.textContent = '考虑中...加载99%';
                text.textContent = '没关系，我可以陪你一起考虑！毕竟我是做技术的，最有耐心了。就像写代码一样，好的结果值得等待～';
            }

            modal.classList.add('active');
        }

        // 关闭弹窗
        function closeModal() {
            const modal = document.getElementById('modal');
            modal.classList.remove('active');
        }

        // 点击背景关闭弹窗
        document.getElementById('modal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });

        // 初始化
        window.onload = function() {
            createPetals();
            createStars();
        };
    </script>
</body>
</html>
